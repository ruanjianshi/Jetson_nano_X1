# GPIO控制模块配置文件

gpio_control:
  # GPIO引脚配置
  gpio_pins: [21, 22, 23, 24, 27, 28, 29, 30]
  
  # 引脚方向配置: 'in' 或 'out'
  pin_direction: 'out'
  
  # 脉冲时间（毫秒）
  pulse_delay: 50
  
  # 读取频率（Hz）
  read_frequency: 10
  
  # 失败重试次数
  retry_count: 3

# GPIO映射配置
gpio_mapping:
  21: "LED_Green"
  22: "LED_Red"
  23: "LED_Yellow"
  24: "Device_Relay1"
  27: "Device_Relay2"
  28: "Sensor_Input"
  29: "System_Reset"
  30: "Status_Indicator"

# 安全配置
safety:
  max_current: 20
  use_protection: true
  enable_watchdog: true