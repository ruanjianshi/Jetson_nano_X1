# ===========================================
# 轮腿机器人硬件参数配置文件 (URDF 提取版)
# Wheeled Legged Robot Hardware Parameters
# ===========================================
#
# 基于 xqrobotV2 URDF: /cfg/robot.urdf
# 关节命名匹配 URDF: left_joint_1/2/3/wheel
#
# URDF质量:
#   base_link: 5.408 kg
#   left_link_1 + right_link_1: 2×0.174 = 0.348 kg
#   left_link_2 + right_link_2: 2×0.673 = 1.345 kg
#   left_link_3 + right_link_3: 2×0.420 = 0.840 kg
#   left/right_link_wheel: 2×2.323 = 4.646 kg
#   总计: 12.588 kg
#
# 修改记录:
#   2026-05-07: URDF提取版 (修正质量/关节限位/方向)
# ===========================================

robot:
  name: "xqrobotV2"
  type: "biped_wheeled"
  mass: 12.59
  gravity: 9.81

leg:
  upper_leg_length: 0.0725             # URDF: j1→j2
  lower_leg_length: 0.301              # URDF: j2→j3
  wheel_offset_length: 0.302           # URDF: j3→wheel (新增L3)
  hip_offset_x: 0.069                  # URDF: joint_1 origin.x
  hip_offset_y: -0.124                 # URDF: joint_1 origin.y
  hip_offset_z: -0.001                 # URDF: joint_1 origin.z
  wheel_offset_y: -0.022               # URDF净偏移Y
  wheel_offset_z: -0.399               # URDF净偏移Z (膝→轮心)
  leg_length_min: 0.15
  leg_length_max: 0.70
  foot_height_min: -0.50
  foot_height_max: 0.20

wheel:
  radius: 0.10
  width: 0.08
  wheel_base: 0.40
  max_wheel_speed: 30.0
  wheel_driver_kp: 20.0
  wheel_driver_kd: 2.0

imu:
  position_x: 0.0
  position_y: 0.0
  position_z: 0.15
  rotation_roll: 0.0
  rotation_pitch: 0.0
  rotation_yaw: 0.0
  neutral_pose:
    roll: 0.0
    pitch: 0.0
    yaw: 0.0
  balance_range:
    roll_max: 0.52
    pitch_max: 0.52
    yaw_max: 3.14

motors:
  - name: "left_joint_1"
    motor_id: 3
    channel: 1
    motor_type: "POWER_FLOW_R86"
    joint_type: "hip_roll"
    direction: 1

  - name: "left_joint_2"
    motor_id: 3
    channel: 1
    motor_type: "POWER_FLOW_R86"
    joint_type: "hip_pitch"
    direction: 1

  - name: "left_joint_3"
    motor_id: 3
    channel: 2
    motor_type: "POWER_FLOW_R52"
    joint_type: "knee_pitch"
    direction: 1

  - name: "left_joint_wheel"
    motor_id: 3
    channel: 2
    motor_type: "POWER_FLOW_R52"
    joint_type: "wheel"
    direction: 1

  - name: "right_joint_1"
    motor_id: 2
    channel: 1
    motor_type: "POWER_FLOW_R86"
    joint_type: "hip_roll"
    direction: -1

  - name: "right_joint_2"
    motor_id: 2
    channel: 1
    motor_type: "POWER_FLOW_R86"
    joint_type: "hip_pitch"
    direction: -1

  - name: "right_joint_3"
    motor_id: 5
    channel: 2
    motor_type: "POWER_FLOW_R52"
    joint_type: "knee_pitch"
    direction: -1

  - name: "right_joint_wheel"
    motor_id: 5
    channel: 2
    motor_type: "POWER_FLOW_R52"
    joint_type: "wheel"
    direction: -1

motor_limits:
  r86:
    max_torque: 80.0
    max_velocity: 27.23
    position_min: -6.28
    position_max: 6.28
    kp_default: 20.0
    kd_default: 2.0

  r52:
    max_torque: 19.0
    max_velocity: 13.61
    position_min: -6.28
    position_max: 6.28
    kp_default: 15.0
    kd_default: 1.5

joint_home:
  hip_roll: 0.0
  hip_pitch: 0.0
  knee_pitch: 0.0
  wheel: 0.0
  hip_roll_offset: 0.0
  hip_pitch_offset: 0.0
  knee_pitch_offset: 0.0
  wheel_offset: 0.0

joint_soft_limits:
  hip_roll:
    min: -3.1416
    max: 3.1416
  hip_pitch:
    min: -2.0944
    max: 2.0944
  knee_pitch:
    min: -0.8727
    max: 0.8727
  wheel:
    min: -50.0
    max: 50.0

control:
  control_frequency: 500
  ethercat:
    interface: "eth0"
    cycle_ns: 2000000
    enable_dc: false
  default_mode: "MIT"
  safety:
    enable_soft_limits: true
    enable_torque_limit: true
    emergency_stop_threshold: 150.0

balance:
  pid:
    kp_roll: 10.0
    kd_roll: 1.0
    ki_roll: 0.0
    kp_pitch: 10.0
    kd_pitch: 1.0
    ki_pitch: 0.0
    kp_yaw: 5.0
    kd_yaw: 0.5
    ki_yaw: 0.0
  target_pose:
    roll: 0.0
    pitch: 0.0
    yaw: 0.0
  algorithm: "LQR"
  max_torque: 50.0
  max_velocity: 10.0

coordinate:
  body_frame:
    x_forward: false
    y_left: false
  joint_direction:
    hip_roll_positive: "left_out"
    hip_pitch_positive: "forward"
    knee_pitch_positive: "backward"
    wheel_positive: "forward"

communication:
  dcu:
    protocol: "EtherCAT"
    model: "AGIBOT_X1"
    channels: 3

  canfd:
    arbitration_baudrate: 1000000
    data_baudrate: 5000000
    sample_point: 0.8

debug:
  enable_debug_output: false
  enable_state_publish: true
  enable_perf_log: false
  state_publish_rate: 50
  log_level: "info"
