# ===========================================
# Wheeled Legged Robot Kinematics Parameters
# (URDF 提取: /balance_control/cfg/robot.urdf)
# ===========================================
#
# xqrobotV2 几何参数:
#   L1 (髋→膝) = sqrt(0.0698² + 0.0195²) ≈ 0.0725 m
#   L2 (膝→踝) = sqrt(0.2236² + 0.015² + 0.200²) ≈ 0.301 m
#   总质量 = 5.41 + 2×(0.174+0.673+0.420+2.323) ≈ 12.59 kg
#
# Author: Qi Xiao
# Date: 2026-05-06 / Revised: 2026-05-07 (URDF)

# ===========================================
# Leg Geometry (URDF提取)
# ===========================================
leg:

  upper_leg_length: 0.0725              # 髋→膝 L1
  lower_leg_length: 0.301               # 膝→踝 L2
  wheel_offset_length: 0.302            # 踝→轮 L3

  hip_offset:
    x: 0.069
    y: -0.124
    z: -0.001

  wheel_offset:
    y: -0.022                          # 轮心Y偏移
    z: -0.399                           # 膝→轮总Z偏移
    radius: 0.10

  workspace:
    min_length: 0.15
    max_length: 0.60
    min_height: -0.40
    max_height: 0.20

# ===========================================
# Wheel Parameters (URDF估计)
# ===========================================
wheel:

  radius: 0.10
  width: 0.08

  position:
    x: 0.069                            # 同hip_offset_x
    y: -0.124
    z: -0.001

  wheel_base: 0.40

  max_speed: 30.0
  max_torque: 50.0

# ===========================================
# Joint Limits (URDF <limit> 提取)
# ===========================================
joint_limits:

  hip_roll:
    min: -3.1416                        # URDF: right_joint_1 lower=-3.14
    max: 3.1416                         # URDF: left_joint_1 upper=3.14
    max_velocity: 27.23                 # URDF: joint_1 velocity

  hip_pitch:
    min: -2.0944                        # URDF: right_joint_2 lower=-2.09
    max: 2.0944                         # URDF: left_joint_2 upper=2.09
    max_velocity: 27.23                 # URDF: joint_2 velocity

  knee_pitch:
    min: -0.8727                        # URDF: joint_3 lower=-0.873
    max: 0.8727                         # URDF: joint_3 upper=0.873
    max_velocity: 13.61                 # URDF: joint_3 velocity

  wheel:
    min: -50.0
    max: 50.0
    max_velocity: 13.61                 # URDF: wheel velocity

# ===========================================
# Home/Zero Positions (URDF零位)
# ===========================================
home_position:
  hip_roll: 0.0
  hip_pitch: 0.0
  knee_pitch: 0.0
  wheel: 0.0

home_offsets:
  hip_roll: 0.0
  hip_pitch: 0.0
  knee_pitch: 0.0
  wheel: 0.0

# ===========================================
# Standing Pose (站立姿态)
# ===========================================
standing_pose:
  body_height: 0.35
  body_pitch: 0.0
  hip_pitch_standing: 0.0
  knee_pitch_standing: 0.0

# ===========================================
# Walking Gait Parameters
# ===========================================
gait:
  step:
    max_height: 0.15
    min_height: 0.02
    length: 0.20
    width: 0.10

  swing_duration: 0.3
  stance_duration: 0.5

  max_forward_speed: 0.5
  max_backward_speed: 0.3
  max_lateral_speed: 0.2
  max_turning_speed: 2.0

# ===========================================
# Coordinate System (机体坐标系)
# ===========================================
# X(右) Y(后) Z(上) — 严格匹配URDF
coordinate_frame:
  joint_directions:
    hip_roll_positive: "outward"        # 绕X轴
    hip_pitch_positive: "forward"       # 绕Y轴
    knee_pitch_positive: "backward"     # 绕Y轴
    wheel_positive: "forward"           # 绕Y轴

  foot_contact:
    z_direction: "down"

# ===========================================
# Kinematics Solver
# ===========================================
solver:
  max_iterations: 100
  tolerance: 0.001
  damping: 0.01
  enable_singularity_handling: true
  joint_limit_weight: 0.1

# ===========================================
# Visualization/Debug
# ===========================================
debug:
  publish_leg_states: true
  publish_tf: true
  visualize_workspace: false
